        <div class="subproject-card" style="animation-delay: 0.00s">
  <h4 class="subproject-card-title">Client-server Interactions with Fault-tolerant Networking</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">TCP</span>
  </div>
  
  <p class="subproject-card-desc">Upon starting the server, it waits until the maximum number of clients connects or until the timer runs out, before starting the server. If the minimum number of players needed to play the game is not reached, the server terminates. Players can connect to the server. Once the game starts, the server is responsible for running all the game logic, listening to player actions, and informing the players of the game state and results through the network. Players crashing does not bring down the server.</p>
  
</div>

  <a class="card-group-header" href="/personal-website/i-worked-on/raft-consensus-algorithm-for-distributed-systems">
    <span class="card-group-title">RAFT: Consensus Algorithm For Distributed Systems</span>
    <span class="chip detail-type-badge--university">University</span>
    <span class="chip chip--tech">C&#43;&#43;</span>
    <span class="card-group-link">View project →</span>
  </a>
  <div class="card-grid card-group-grid">
    
    
    
      
      <a href="/personal-website/i-worked-on/raft-consensus-algorithm-for-distributed-systems#client-server-interactions-with-fault-tolerance" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.00s">
  <h4 class="subproject-card-title">Client-server Interactions with Fault-tolerance</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Linux</span><span class="chip chip--tech">TCP</span>
  </div>
  
  <p class="subproject-card-desc">The servers are nodes of the RAFT algorithm. Clients are those who wish to submit commands for the RAFT algorithm to persist. The networking interactions are done through the <span class="chip chip--tech chip--inline">Unix Socket Library</span>. Any of the servers can crash (and that is assumed to be the only mode of failure), without crashing the other servers. As long as majority of the nodes are alive, the system can continue to make progress. If majority of the nodes are no longer alive, the data will persist as one node is alive, but the system can no longer agree on new values.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/raft-consensus-algorithm-for-distributed-systems#leader-election" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.05s">
  <h4 class="subproject-card-title">Leader Election</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Algorithms</span>
  </div>
  
  <p class="subproject-card-desc">A key element of the algorithm is leader election. A server by itself is just a hunk of metal capable of computation, but RAFT consensus algorithm associates each server node with a role. The two essentials roles are leader and follower. There can only at most be one leader. Followers are able to be promoted to leader, which happens in the case where the system just started and there are no leaders to begin with, or the leader crashes. How this happens is defined in the RAFT specifications, specifically the &#34;Vote Request&#34; <span class="chip chip--tech chip--inline">RPC</span>, which I implemented. A follower that wants to be a leader sends the request to all the other nodes, and if it receives yes from the majority, it becomes the leader.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/raft-consensus-algorithm-for-distributed-systems#log-replication-with-custom-memory-slab-allocator" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.10s">
  <h4 class="subproject-card-title">Log Replication With Custom Memory Slab Allocator</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Data Structures</span>
  </div>
  
  <p class="subproject-card-desc">Another key element is that each node keeps track of the full history of commands, in a log data structure. What it means for nodes to be in sync is for their logs to be the same. The leader&#39;s log is replicated to the followers. My implementation of the log data structure uses my own memory allocator that allocates in memory-aligned chunks, that are a multiple of page sizes. The allocator holds a linked list of the chunks, and a chunk holds tightly-packed log entries.</p>
  
</div>

      </a>

      <a href="/personal-website/i-worked-on/raft-consensus-algorithm-for-distributed-systems#client-server-interactions-with-fault-tolerance" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.00s">
  <h4 class="subproject-card-title">Client-server Interactions with Fault-tolerance</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Linux</span><span class="chip chip--tech">TCP</span>
  </div>
  
  <p class="subproject-card-desc">The servers are nodes of the RAFT algorithm. Clients are those who wish to submit commands for the RAFT algorithm to persist. The networking interactions are done through the <span class="chip chip--tech chip--inline">Unix Socket Library</span>. Any of the servers can crash (and that is assumed to be the only mode of failure), without crashing the other servers. As long as majority of the nodes are alive, the system can continue to make progress. If majority of the nodes are no longer alive, the data will persist as one node is alive, but the system can no longer agree on new values.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/raft-consensus-algorithm-for-distributed-systems#leader-election" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.05s">
  <h4 class="subproject-card-title">Leader Election</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Algorithms</span>
  </div>
  
  <p class="subproject-card-desc">A key element of the algorithm is leader election. A server by itself is just a hunk of metal capable of computation, but RAFT consensus algorithm associates each server node with a role. The two essentials roles are leader and follower. There can only at most be one leader. Followers are able to be promoted to leader, which happens in the case where the system just started and there are no leaders to begin with, or the leader crashes. How this happens is defined in the RAFT specifications, specifically the &#34;Vote Request&#34; <span class="chip chip--tech chip--inline">RPC</span>, which I implemented. A follower that wants to be a leader sends the request to all the other nodes, and if it receives yes from the majority, it becomes the leader.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/raft-consensus-algorithm-for-distributed-systems#log-replication-with-custom-memory-slab-allocator" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.10s">
  <h4 class="subproject-card-title">Log Replication With Custom Memory Slab Allocator</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Data Structures</span>
  </div>
  
  <p class="subproject-card-desc">Another key element is that each node keeps track of the full history of commands, in a log data structure. What it means for nodes to be in sync is for their logs to be the same. The leader&#39;s log is replicated to the followers. My implementation of the log data structure uses my own memory allocator that allocates in memory-aligned chunks, that are a multiple of page sizes. The allocator holds a linked list of the chunks, and a chunk holds tightly-packed log entries.</p>
  
</div>

      </a>

      <a href="/personal-website/i-worked-on/designing-a-compiler#garbage-collection" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.00s">
  <h4 class="subproject-card-title">Garbage Collection</h4>
  
  <p class="subproject-card-desc">A stop-the-world garbage collector, by applying graph theory to implement Cheney&#39;s semispace collector, implemented with <span class="chip chip--tech chip--inline">C</span>.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/designing-a-compiler#a-normal-form-anf" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.05s">
  <h4 class="subproject-card-title">A-normal Form (ANF)</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Data Structures</span>
  </div>
  
  <p class="subproject-card-desc">There is a compiler phase that turns the abstract syntax tree to ANF, an intermediary representation that makes every intermediate computation named. This makes it easier to compile down to Assembly.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/designing-a-compiler#graph-colouring-register-allocation" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.10s">
  <h4 class="subproject-card-title">Graph Colouring Register Allocation</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Algorithms</span><span class="chip chip--tech">Data Structures</span>
  </div>
  
  <p class="subproject-card-desc">Accessing a value in a register is faster than accessing it on the stack, so we want to keep values in registers for as long as possible. To do this, we track the liveness of each value — the range of the program over which it is needed — and use Chaitin&#39;s graph colouring algorithm to assign values to registers optimally</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/designing-a-compiler#exceptions" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.15s">
  <h4 class="subproject-card-title">Exceptions</h4>
  
  <p class="subproject-card-desc">This programming language allows users to throw and catch exceptions.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/designing-a-compiler#built-in-testing-functionality" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.20s">
  <h4 class="subproject-card-title">Built-in Testing Functionality</h4>
  
  <p class="subproject-card-desc">Normally, to run tests in a programming language, one has to use a library. This makes test organization awkward, and the library would have to use reflection magic to test for errors. In this programming language, tests are first-class citizens and can be woven into the code, and the code can be executed without the tests. The <span class="chip chip--tech chip--inline">C</span> run-time accumulates the test information and prints them out at the end.</p>
  
</div>

  <a class="card-group-header" href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine">
    <span class="card-group-title">Typed-untyped Interactions Through Machine</span>
    <span class="chip detail-type-badge--university">University</span>
    <span class="chip chip--tech">Typed Racket</span>

  <div class="card-grid card-group-grid">
    
    
    
    
      
      <a href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine#cesk-machine" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.00s">
  <h4 class="subproject-card-title">CESK Machine</h4>
  
  <p class="subproject-card-desc">Implemented a programming language via a CESK abstract machine — a formal model of computation where program execution is expressed as a sequence of discrete state transitions. Each state is a tuple of four components: the Control (the expression currently being evaluated), the Environment (bindings of variables to values), the Store (mutable memory), and the Kontinuation (the rest of the computation). Execution begins at a well-defined initial state and steps through intermediate states until it reaches a final one, giving the language a rigorous, mathematically grounded operational semantics.</p>
  
</div>

      </a>
      
      
    
    
    
      
      <a href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine#classes-modules" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.05s">
  <h4 class="subproject-card-title">Classes &amp; Modules</h4>
  
  <p class="subproject-card-desc">This language features classes, methods, and objects. On top of that, the language also features typed and untyped modules, and both can import each other. A module can only contain one class.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine#tail-calls" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.10s">
  <h4 class="subproject-card-title">Tail Calls</h4>
  
  <p class="subproject-card-desc">This language has tail calls. That is, when a function call is the last thing that is being computed, a new stack will not be allocated.</p>
  
</div>

      </a>
      
      
    
    
    
    
      
      <a href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine#typed-untyped-interactions-javascript-style" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.15s">
  <h4 class="subproject-card-title">Typed-untyped Interactions (JavaScript Style)</h4>
  
  <p class="subproject-card-desc">The <span class="chip chip--tech chip--inline">JavaScript</span> way of handling typed-untyped interactions is by running all type checks statically, and then strip away all the types prior to execution.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine#typed-untyped-interactions-racket-style" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.20s">
  <h4 class="subproject-card-title">Typed-untyped Interactions (Racket Style)</h4>
  
  <p class="subproject-card-desc">The Racket way of handling typed-untyped interactions is by running all type checks statically, and wrapping values that would be passed from typed modules to untyped modules in run-time checks for actual execution.</p>
  
</div>

      </a>
      
      
    
    
    
      
      <a href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine#unit-and-integration-testing-featuring-macros" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.25s">
  <h4 class="subproject-card-title">Unit and Integration Testing, Featuring Macros</h4>
  
  <p class="subproject-card-desc">On top of unit tests for specific functions, there exist integration tests for specific phases of the language implementation. There are integration tests that targets the core logic of the CESK machine specifically, and through the use of <span class="chip chip--tech chip--inline">Macros</span>, allows me to write the intermediate states of the abstract machine in a sequence, and the test runner would check that the state of machine goes through the sequence correctly.</p>
  
</div>

      </a>
      
      
    
      
      <a href="/personal-website/i-worked-on/typed-untyped-interactions-through-machine#programming-language-level-test-harness" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.30s">
  <h4 class="subproject-card-title">Programming-language-level Test Harness</h4>
  
  <p class="subproject-card-desc">An overarching test harness, a script written in Typed Racket, takes in entire programs written in the programming language, as well as a file that just contains the expected output, and checks if the actual output as produced by the implementation of the programming language equals to the expected output.</p>
  
</div>

      </a>

      <a href="/personal-website/i-worked-on/dreams-of-celestial-pull-a-physics-based-first-person-shooter-platformer#fps-movement-rk4" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.00s">
  <h4 class="subproject-card-title">FPS Movement &amp; RK4</h4>
  
  <div class="subproject-card-chips">
    <span class="chip chip--tech">Algorithms</span><span class="chip chip--tech">3D</span>
  </div>
  
  <p class="subproject-card-desc">This game features an interesting marriage between two contrasting notions of <span class="chip chip--tech chip--inline">Physics</span> simulation. FPS movement includes on-ground movement and jumping. On-ground movement has acceleration with max velocity. As the game is a platformer, the player can cut a jump short by letting go of jump fast rather than holding down the button. There is also air control, where acceleration in the air is lower. The other notion of physics simulation is RK4, or fourth-order Runge-kutta method. Given a position and velocity of an object, and a function that computes the object&#39;s acceleration, the method can produce the next object&#39;s position and velocity. The method uses calculus effectively in order to get good approximations with minimal additional computations. This is not the standard approach to movement physics. I used it in my game anyway because the movements physics is tremendously better and the game still runs smoothly. These two notions of movement physics don&#39;t naturally work together. The FPS-specific physics has a lot of edge cases and handles player input, whereas RK4 is a general purpose function and does not consider player input. Still, I made it work.</p>
  
</div>

      </a>
      
      
    
    
  </div>
  
  
    
    
    
  
    
    
    
  
  
  <a class="card-group-header" href="/personal-website/i-worked-on/boids-with-goals-a-game-ai-project">

    <span class="chip detail-type-badge--university">University</span>
    <span class="chip chip--tech">JavaScript</span><span class="chip chip--tech">Physics</span><span class="chip chip--tech">Algorithms</span><span class="chip chip--tech">2D</span>
    <span class="card-group-link">View project →</span>
  </a>
  <div class="card-grid card-group-grid">
    
    
    
    
      
      <a href="/personal-website/i-worked-on/boids-with-goals-a-game-ai-project#boids-movement-with-multi-layered-dijkstra-path-finding" class="card-link-wrapper">
        <div class="subproject-card" style="animation-delay: 0.00s">
  <h4 class="subproject-card-title">Boids Movement with Multi-layered Dijkstra Path-finding</h4>
  
  <p class="subproject-card-desc">A boid&#39;s movement is based on local conditions close to its proximity, like distance and alignment to neighbouring boids, as well as obstacles to not fly into. However, goal-oriented behaviour requires the boid to navigate to a point which may exist beyond said proximity. With obstacles, there needs to exist some intelligence to not fly blindly into a dead end. While the twin goals of navigation by local and global conditions conflict, my approach uses multi-layered Dijkstra&#39;s algorithm to create a field of forces, generating local conditions from global ones. Where a boid moves is the sum of its regular boid&#39;s movement and the vector at the position of the map as produced by Dikstra&#39;s algorithm.</p>
  
</div>

      </a>
      
      
    
    
    
    
      
      <a href="/personal-website/i-worked-on/boids-with-goals-a-game-ai-project#collision-detection" class="card-link-wrapper">

  <h4 class="subproject-card-title">Collision Detection</h4>
  
  <p class="subproject-card-desc">Each boid determines whether it&#39;s about to fly into an obstacle by shooting a ray in front of it and seeing if it intersects with an obstacle. All obstacles are rectangles.</p>
  
</div>

      </a>

      <a href="/personal-website/i-worked-on/toxic-texting-a-chill-texting-game-where-you-only-respond-with-yes-or-no#dialogue-game-systems" class="card-link-wrapper">

        <div class="subproject-card" style="animation-delay: 0.50s">
  <h4 class="subproject-card-title">Engine Architecture</h4>
  
  <p class="subproject-card-desc">I was inspired by Handmade Hero when establishing much of the engine&#39;s <span class="chip chip--tech chip--inline">Architecture</span>. There are four major software components: renderer, platform, engine and game. The renderer encapsulates all the messiness of displaying things on the screen and interactions with the GPU. The platform encapsulates the messiness of operating system. There is a strong relationship between the platform and the renderer. The engine is the entry point to the game-side of things, and calls into the game code. It holds code that all the game uses. The game-side of things is for code that is specific to one game. Note that the engine and game modules do not interact with the renderer directly.</p>
