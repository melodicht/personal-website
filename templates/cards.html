{{/* This fragment is what Datastar swaps into #card-grid */}}
<div id="card-grid" class="card-grid cards-enter">
  {{range .}}
  <article class="card">
    <div class="card-body">
      <h3 class="card-title">{{.Title}}</h3>
      <p class="card-desc">{{.Description}}</p>
    </div>
    <div class="card-footer">
      {{range .Tags}}<span class="tag">{{.}}</span>{{end}}
      <a class="card-link" href="{{.Link}}">View →</a>
    </div>
  </article>
  {{end}}
</div>
