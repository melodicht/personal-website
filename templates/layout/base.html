{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marvin's Website</title>
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-layer" id="bg-a"></div>
  <div class="bg-layer" id="bg-b"></div>
  <div class="bg-overlay"></div>

  <div id="app" {{.Signals}}{{if .Effect}} data-effect="{{.Effect}}"{{end}}>
    <div class="layout">
      {{template "nav" .Nav}}
      <div id="non-nav">
        {{if .Picker}}{{execTemplate .Picker .}}{{end}}
        <main class="col-content">
          {{if .Content}}{{execTemplate .Content .}}{{end}}
        </main>
      </div>
    </div>
  </div>

  {{if .Scripts}}{{execTemplate .Scripts .}}{{end}}
</body>
</html>
{{end}}
