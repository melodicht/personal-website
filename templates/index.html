<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I make _</title>
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <script>window.SITE_CONFIG = {{.}};</script>
</head>
<body>
  <div class="bg-layer" id="bg-a"></div>
  <div class="bg-layer" id="bg-b"></div>
  <div class="bg-overlay"></div>

  <!--
    Card template — pure HTML, no JS strings.
    ticker.js clones this and fills in the data.
  -->
  <template id="card-template">
    <article class="card">
      <div class="card-body">
        <h3 class="card-title"></h3>
        <p class="card-desc"></p>
      </div>
      <div class="card-footer"></div>
    </article>
  </template>

  <div
    id="app"
    data-signals='{"currentWord": "", "locked": false}'
  >
    <section class="hero">
      <div class="headline">
        <span class="i-make">I make</span>

        <input id="word-input"   type="text" data-bind:current-word style="display:none" />
        <input id="locked-input" type="checkbox" data-bind:locked style="display:none" />

        <div class="ticker-wrap">
          <div class="ticker" id="ticker"></div>
        </div>
      </div>

      <p
        class="lock-hint"
        data-text="$locked ? 'locked on ' + $currentWord + ' — click again to unlock' : 'click any word to lock it'"
      ></p>
    </section>

    <!--
      data-effect re-runs whenever $currentWord changes.
      renderCards() is defined in ticker.js and receives the word as an argument.
    -->
    <section
      class="projects"
      data-effect="$currentWord && renderCards($currentWord)"
    >
      <div id="card-grid" class="card-grid"></div>
    </section>

  </div>

  <script src="/static/ticker.js"></script>
</body>
</html>
