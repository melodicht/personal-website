<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I</title>
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    window.SITE_CONFIG = {{.Config}};
    window.SITE_DATA   = {{.SiteData}};
  </script>
</head>
<body>
  <div class="bg-layer" id="bg-a"></div>
  <div class="bg-layer" id="bg-b"></div>
  <div class="bg-overlay"></div>

  <!-- Card template -->
  <template id="card-template">
    <article class="card">
      <div class="card-body">
        <h3 class="card-title"></h3>
        <p class="card-desc"></p>
      </div>
      <div class="card-footer"></div>
    </article>
  </template>

  <div
    id="app"
    data-signals='{"mode": "do", "focus": "", "jobFocus": 0}'
  >
    <!-- ── Three-column layout ──────────────────────────────────── -->
    <div class="layout">

      <!-- ── Col 1: Nav ────────────────────────────────────────── -->
      <nav class="col-nav">
        <div class="nav-ticker" id="nav-ticker">
          <!-- items injected by nav.js -->
        </div>
      </nav>

      <!-- ── Col 2: Picker (conditional) ──────────────────────── -->
      <div class="col-picker" id="col-picker">

        <!-- Tag ticker (mode = do) -->
        <div id="picker-do" data-show="$mode === 'do'">
          <input id="focus-input" type="text" data-bind:focus style="display:none" />
          <div class="ticker-wrap">
            <div class="ticker" id="tag-ticker"></div>
          </div>
        </div>

        <!-- Job cells (mode = worked-at) -->
        <div id="picker-worked-at" data-show="$mode === 'worked-at'">
          <div class="job-list" id="job-list">
            <!-- injected by jobs.js -->
          </div>
        </div>

      </div>

      <!-- ── Col 3: Content ────────────────────────────────────── -->
      <main class="col-content">

        <!-- I do: subproject cards filtered by tag -->
        <section data-show="$mode === 'do'">
          <div
            id="card-grid"
            class="card-grid"
            data-effect="$focus && renderCards($focus)"
          ></div>
        </section>

        <!-- I worked at: job detail -->
        <section data-show="$mode === 'worked-at'" data-effect="$mode === 'worked-at' && renderJobDetail($jobFocus)">
          <div id="job-detail"></div>
        </section>

        <!-- I worked on: projects by category -->
        <section data-show="$mode === 'worked-on'">
          <div id="worked-on-grid"></div>
        </section>

        <!-- I: bio -->
        <section data-show="$mode === 'about'">
          <div class="bio" id="bio-text"></div>
        </section>

      </main>
    </div>
  </div>

  <script src="/static/nav.js"></script>
  <script src="/static/ticker.js"></script>
  <script src="/static/jobs.js"></script>
  <script src="/static/render.js"></script>
</body>
</html>
