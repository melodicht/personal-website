{{define "bullet-point"}}
{{- $own := OwnTechTags .Subproject .InheritedTechTags -}}
<li class="bullet-point">
  <p class="bullet-point-text">
    {{range .Subproject.ParsedDescription}}{{if .IsChip}}<span class="chip chip--tech chip--inline">{{.Value}}</span>{{else}}{{.Value}}{{end}}{{end}}
    {{range $own}}<span class="chip chip--tech chip--inline">{{.}}</span> {{end}}
  </p>
</li>
{{end}}
