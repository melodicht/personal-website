{{define "source-code-link"}}
{{if .SourceCode.OnRequest}}
<a class="source-code-link source-code-link--request"
   href="{{.BasePath}}/contact.html">Source code available upon request</a>
{{else if .Link}}
<a class="source-code-link" href="{{.SourceCode.Link}}" target="_blank" rel="noopener">View source code →</a>
{{end}}
{{end}}
